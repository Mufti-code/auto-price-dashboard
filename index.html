<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auto Price Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1 class="title">📊 Auto Price Dashboard</h1>
  <p class="subtitle">Manage products with automation</p>

  <input type="text" id="search" placeholder="🔍 Search product..." />

  <button class="add-btn" onclick="openModal()">+ Add Product</button>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Add Product</h2>
    <input type="text" id="name" placeholder="Product Name" />
    <input type="text" id="price" placeholder="Price (contoh: 150000)" />
    <input type="number" id="stock" placeholder="Stock" />

    <div class="modal-actions">
      <button class="save" onclick="saveOffer()">Save</button>
      <button class="cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
